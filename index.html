<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante</title>

<body>
    <main>
         <section >
<div class="out_box">
                <h2>Formulario de Reserva</h2>
        <div id="CONTACTO" class="formulario_1">
            <h2>Contacta con nosotros</h2>
             <form id="contacto" name="contacto" method="get" action="mailto:tuemail@dominio.es">
                <div>
                    <label>Nombre:</label>
                    <input name="nombre" type="text" maxlength="60" required placeholder="Nombre y Apellidos"><br><br>
                </div>
                <div>
                    <label>Email:</label>
                    <input name="email" type="email" required placeholder="abc123@dominio.ex"><br><br>
                </div>
                <div>
                    <label>Telefono:</label>
                    <input name="telefono" type="tel" required placeholder="Ej: 612345678"><br><br>
                </div>
                <div>
                    <label>Personas:</label>
                    <input name="personas" type="number" min="2" max="20" value="4" required><br><br>
               </div>
               <div style="display: flex; align-items: center; gap: 10px;">
                    <label>Fecha:</label>
                    <input name="fecha" type="date" required> <input type="time" required value="20:00" >
                </div>
                <br>
                <div>
                    <label>Mensaje:</label>
                    <textarea rows="5" cols="50" maxlength="300" placeholder="Escribenos cualquier informacion adicional."></textarea><br>
                </div>
                <br><br>
                <input type="submit" value="Enviar" class="button"><br><br>
                <label class="checkbox">
                    <input type="checkbox" name="privacidad" required>* Política de Privacidad
                </label>
            </div>
            <script>
                const hoy = new Date().toISOString().split('T')[0];
                document.getElementById('fecha').setAttribute('min', hoy);
            </script>
        </div>
